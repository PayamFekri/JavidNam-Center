name: Build Sar Manager Android APK

on:
  push:
    branches: [ "main" ] # این workflow روی هر push به شاخه main اجرا می‌شود
  workflow_dispatch: # اجازه می‌دهد به صورت دستی هم اجرا شود

jobs:
  build:
    runs-on: ubuntu-22.04 # سیستم عامل که GitHub Actions استفاده می‌کند

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # گرفتن کد پروژه از گیت‌هاب

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # نسخه پایتون مورد نیاز شما

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev \
            libssl-dev cmake # ابزارهای مورد نیاز برای بیلد

      - name: Install Buildozer and Kivy
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy # نصب buildozer و kivy

      - name: Create buildozer.spec file
        run: |
          # اگر buildozer.spec در روت پروژه نیست، باید آن را بسازیم
          # یا مطمئن شویم که در پوشه صحیح قرار دارد.
          # در این مثال فرض می‌کنیم buildozer.spec در روت پروژه است.
          echo "Spec file created/used: buildozer.spec"
          # اگر نیاز بود buildozer.spec را از اینجا بسازید، از دستور زیر استفاده کنید:
          # cp buildozer.spec.template buildozer.spec
          # یا محتوا را مستقیما اینجا بنویسید

      - name: Build APK
        run: |
          buildozer android debug # اجرای دستور بیلد برای ساخت APK نسخه دیباگ

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sar-manager-apk # نام فایل خروجی که دانلود می‌کنید
          path: bin/*.apk # مسیر فایل APK ساخته شده توسط buildozer