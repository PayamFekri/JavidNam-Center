{% extends "shop/base.html" %}
{% block content %}
<h2>سبد خرید</h2>
<table class="table">
    <thead>
        <tr><th>محصول</th><th>قیمت</th><th>تعداد</th><th>مجموع</th><th></th></tr>
    </thead>
    <tbody>
        {% for item in cart %}
            <tr>
                <td>{{ item.product.name }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.total_price }}</td>
                <td><a href="{% url 'shop:cart_remove' item.product.id %}">حذف</a></td>
            </tr>
        {% endfor %}
        <tr><td colspan="3">جمع کل</td><td>{{ cart.get_total_price }}</td><td></td></tr>
    </tbody>
</table>
<a href="/" class="btn btn-secondary">ادامه خرید</a>
{% endblock %}
