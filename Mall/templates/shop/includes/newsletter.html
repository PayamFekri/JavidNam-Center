{% load static %}
<section class="newsletter bg-light" style="background: url({% static 'images/pattern-bg.png' %}) no-repeat;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 py-5 my-5">
                <div class="subscribe-header text-center pb-3">
                    <h3 class="section-title text-uppercase">عضویت در خبرنامه</h3>
                </div>
                <form method="post" action="#" class="d-flex flex-wrap gap-2">
                    {% csrf_token %}
                    <input type="email" name="email" placeholder="آدرس ایمیل خود را وارد کنید" class="form-control form-control-lg" required>
                    <button type="submit" class="btn btn-dark btn-lg text-uppercase w-100">عضویت</button>
                </form>
            </div>
        </div>
    </div>
</section>
