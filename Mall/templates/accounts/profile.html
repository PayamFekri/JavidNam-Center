{% extends "shop/base.html" %}
{% load static %}

{% block title %}پروفایل کاربری{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">پروفایل کاربری</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-user-circle fa-5x text-secondary mb-3"></i>
                <h3>{{ user.username }}</h3>
                <p class="text-muted">ایمیل: {{ user.email|default:"ثبت نشده" }}</p>
                <p class="text-muted">تاریخ عضویت: {{ user.date_joined|date:"Y/m/d" }}</p>
                <hr>
                <a href="{% url 'accounts:logout' %}" class="btn btn-danger">
                    <i class="fas fa-sign-out-alt"></i> خروج از حساب
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
