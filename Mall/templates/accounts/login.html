{% extends "shop/base.html" %}
{% load static %}

{% block title %}ورود به حساب کاربری{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="mb-0">ورود به حساب کاربری</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">نام کاربری</label>
                        <input type="text" name="username" class="form-control" id="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">رمز عبور</label>
                        <input type="password" name="password" class="form-control" id="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-dark w-100">ورود</button>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p class="mb-0">حساب کاربری ندارید؟ 
                        <a href="{% url 'accounts:register' %}">ثبت‌نام کنید</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
